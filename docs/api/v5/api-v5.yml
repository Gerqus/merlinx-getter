      description: |
        Tokens provide secure way of keeping your credentials safe from exposing
        (even to your 3rd party application developers).

        - Each website or service SHOULD use own token (ideally each user).
        - There are no limitations of amount of tokens.
        - We do not store list of tokens, so there is no possibility to retrieve list of valid tokens.
        - It is RECOMMENDED to specify own ttl (but it MAY be lower that the one you specified, but never higher)
        - Fields domain and acquirer MUST NOT contain sensitive informations, they are not securely encoded inside token.
        - Domain SHOULD be provided during token creation, otherwise it MUST be provided for every request.

      type: apiKey
      in: header
      name: X-TOKEN
    Domain:
      description: |
        application domain, some parts of system can have different configuration for each domain.
        can be included in token (simply pass it during token creation) or with each request.
      type: apiKey
      in: header
      name: X-DOMAIN
security:
  - TokenAuth: [ ]
