  /v4.1/booking/cancel:
    post:
      parameters:
        - $ref: "#/components/parameters/bookingNr"
        - $ref: "#/components/parameters/operator"
      summary: Cancel
      operationId: V41bookingCancel
      description:
        Cancelling the booking reservation. Cancellation possibility and possible costs, should be checked beforehand was cancel. Please always suggest the terms and conditions of the tour operator.
      tags:
        - bookv4.1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/bookcancel"
