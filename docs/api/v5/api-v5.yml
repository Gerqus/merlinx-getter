    response_401:
      description: Unauthorized
      content:
        application/json:
          schema:
            type: object
            properties:
              reason:
                enum: [ TOKEN_CORRPUTED,TOKEN_INVALID,TOKEN_INVALIDATED,TOKEN_EXPIRED,ACCOUNT_LOCKED,ACCOUNT_NOT_FOUND ]
                description: >
                  - TOKEN_INVALID - for internal reasons token isn't valid

                  - TOKEN_INVALIDATED - creation date of token is before date specified in invalidatetoken request

                  - TOKEN_EXPIRED - token reached its time to life

                  - ACCOUNT_LOCKED - account have been locked, contact tech support

                  - TOKEN_CORRUPTED - can't read token data

                  - ACCOUNT_NOT_FOUND - accound was deleted or token is invalidated because of password change
