openapi: 3.0.0
info:
  title: Merlin Web Services
  description: |
    # Basics
    Merlin Web Services (MWS) is a set of services for providing travel offers, leisure and business.
    This documentation covers basic usea of data search functions. By using individual functions, we will be able to search, compare and book the   tour operators offers.

    Remember, that in all requests you must use your credentials for access. If you have no account for MWS, please contact us, to order the product.

    The key words "MUST", "MUST NOT", "REQUIRED", "SHALL", "SHALL
    NOT", "SHOULD", "SHOULD NOT", "RECOMMENDED",  "MAY", and
    "OPTIONAL" in this document are to be interpreted as described in
    RFC 2119.

    # Data Operators
    We identify data operator by using 3-4 letter codes (field: ofr_oper), they are assigned internally in our system.
    Each operator means a different connection to external system. Operators can be online or offline. 

    We do not act as an intermediary in signing the contract. 

    Current tour operators list is available under following link https://www.merlinx.pl/dostawcy/.

    Please contact your local MerlinX support in order to receive the exact locations of these lists for your country.

    # Become an external data provider
    To became external data provider, please go to external provider section, anyway we encorage you to go thru this
    document in order.


  version: 5.3.2
  x-logo:
    url: 'mxlogo.png'
    altText: MerlinX Logo
servers:
  - url: 'https://mwsv5pro.merlinx.eu'

tags:
  - name: Tokens
    description: |
      This is a effective authentication which allow communication in the further part of the query. Without a valid token You will not receive any results.

  - name: Search
    description: |
      Offers request are divided by type of content.

  - name: Trips
    x-displayName: Trips/Fligts/Hotels
    description: |
      The primary way to get travel offers this include only hotels, charter flights and leisure packages (mostly packages (including dynamic), roundtrips, cruises, etc., but also only hotels offers or flight and bus seats). 

      Depends on what kind of offers would You like to show and sell on Your portal.
      To build a search engine you need to follow these steps:
      - start with a searchform, the searchbase request will return all known possible values
      for specified field types.
      - grouped offer search, you can get results grouped by specified field (default: by hotel)
      - list of offers, which will return offers for the selected hotel

  - name: Insurances
    x-displayName: Insurances
    description: |
      The way to get travel insurance offers.
      
      To build a search engine you need to follow these steps:
      - start with a searchform, the searchbase request will return all known possible values
      for specified field types.
      - list of offers, which will return offers for the selected search parameters

  - name: Parkings
    x-displayName: Parkings
    description: |
      The way to get parking offers (corresponding to departure airports mostly).
      
      To build a search engine you need to follow these steps:
      - start with a searchform, the searchbase request will return all known possible values
      for specified field types.
      - list of offers, which will return offers for the selected search parameters

  - name: Booking
    description: |
      The way to get proper booking form, prepare required data and make booking.
      
      To get proper booking form you need to followe these steps:
      - start with form request, this request will provide booking form with all possible fields, offers current status and price
      - check with formcheck request sending back filled form, that contains choosen options and filled data ie. person codes and bithdates, it will update offers current status and price

  - name: bookv4.1
    x-displayName: Booking V4.1
    description: |
      It functions as a "drop in" replacement for the older v4 format. 
      The response format matches older bookv4 format (existing sources can be reused)

  - name: offer
    x-displayName: Offer
    description: |
      fields returned in offer
      ## Base
        General (standarized) fields for the offer regardless of the type
      <SchemaDefinition schemaRef="#/components/schemas/offer.base" />
      ## Accommodation
        Field associated with  accommodation or tour
      <SchemaDefinition schemaRef="#/components/schemas/offer.accommodation" />
      ## Transport
      <SchemaDefinition schemaRef="#/components/schemas/offer.transport" />
      ## XCodeBlock
      matched regions, cities, countries, hotel names , unified data of all tour operators. 
      
      
      Explaining: 

      - **XCountry** - grouped countries, unified country name
      
      - **XRegion** - matched regions, unified regions name	
      
      - **XCity** - grouped cities, unified cities name
      
      - **XCode** - standardized object id, assigned to the hotel by MerlinX, unified hotel code which was matched. Please do not confuse Xcode with the hotel ID (orginal touroperator's hotel number). 

      <SchemaDefinition schemaRef="#/components/schemas/offer.xcodeblock" />
      ## Online
        Information about dynamic fields
      <SchemaDefinition schemaRef="#/components/schemas/offer.online" />

  - name: searchfields
    x-displayName: Search Fields
    description: |
      Searchfield type can be terermined by property name:
      ## Text
        text field with optional regexp pattern
        <SchemaDefinition schemaRef="#/components/schemas/searchbasefield.text" />
      ## List
      Select or multiselect list
      <SchemaDefinition schemaRef="#/components/schemas/searchbasefield.list" />
      ## Range
      range selector: from - to with step
      <SchemaDefinition schemaRef="#/components/schemas/searchbasefield.range" />
      ## Num
        single numeric value
      <SchemaDefinition schemaRef="#/components/schemas/searchbasefield.num" />

      ## Grouped List
        2 level list, returns a grouped list presenting a list of objects.
      <SchemaDefinition schemaRef="#/components/schemas/searchbasefield.grouped_list" />

      ## Attribute
      <SchemaDefinition schemaRef="#/components/schemas/searchbasefield.attribute" />

      ## Participant List
      return allowed participant definition forms
      <SchemaDefinition schemaRef="#/components/schemas/participantsList" />

      ## ComponentCombinations
      return allowed combinations of components. We use all combinations of transport and accommodation creating offers depending on the tour operator, each has its own combinations.  

      The order length transport and stay selected type of vacation depends on the operator. They can be longer or shorter stays.  

      We distinguish the following types of transport:

      - **"transport.flight","accommodation.*"** - flight with accommodation
      - **"transport.flight"** - only flight 
      - **"transport.onewayflight"** - one way flight
      - **"transport.train", "accommodation.*"** - train ride with accommodation
      - **"transport.bus", "accommodation.*"** - bus ride with accommodation
      - **"transport.bus"** - bus ride 



      The following can be mentioned types of accommodation:   

      - **"accommodation.hotel"**- only hotel stay 
      - **"accommodation.apartament"** - a multi-room apartment of high standard 
      - **"accommodation.trip"** - a road trip, visiting several units 
      - **"accommodation.holidayhome"** - holiday house
      - **"accommodation.cruise"** - a cruise on the sea or on a rive
      - **"accommodation.citybreak"** - a trip around a city or visiting several citie
      - **"accommodation.childcamp"** - events dedicated only for children
      - **"accommodation.cruisePL"** - a cruise on the sea or on a rive with polish animator
      - **"accommodation.pilgrimage"** - religious events
      - **"accommodation.activetravel"** - event with activity, e.g. downhill biking, rafting 
      - **"accommodation.sanatorium"** - stay in sanatorium
      - **"accommodation.camp"** - camping 

      We enumerate yet special types of tour require a combination query:
      
      - **Road trip (ObjazdĂłwka/ Wyc.objazdowe)**-  visiting several units, sightseeing 
      
      e.g.
         [["transport.flight","accommodation.hotel"]]
      
      - **2in1 hotel+hotel** -  one week we stay in a selected hotel and next week spends in another one, length of day depends from tour operator .
      
       e.g.
       [["transport.flight","accommodation.hotel"],["accommodation.hotel"]]

      - **Z+W or trip+hotel (Zwiedzanie + Wypoczynek)** -  first week round trip, second week stay in a hotel, sightseeing and leisure,  length of day depends from tour operator.

      e.g. 
      [["transport.flight","accommodation.trip"],["accommodation.hotel"]]
      
      <SchemaDefinition schemaRef="#/components/schemas/searchbasefield.components_combinations" />

      ## Full SearchbaseModel
      <SchemaDefinition schemaRef="#/components/schemas/searchbase" />

      ## Attributes
      
      description:
         Attributes allows to specify the location, facilities or activities of the offer or hotel
      ### object localisation
      - location_mountains - object is situated in or near mountains
      - location_near_the_slope - object is located near the slope (under 100 meters)
      - location_exotic_offers - object is located in an exotic country (outside Europe and Mediterranean countries)
      - location_lakes - object is located onshore or near a lake
      - location_ski_resorts - object is located in MerlinX ski region
      - location_city_breaks - object is located in the city, worth a city break
      - location_directly_on_the_beach - object is located onshore and you can pass from the main building to the beach without cross any road or other obstacle
      - location_near_airport - object is situated under 50 km from the nearest international airport
      - location_near_the_center - object is located in the city center

      ### object facilities
      - facility_free_wifi - in a room or at least one open to the public place in the object free wi-fi access is possible
      - facility_for_adult - object is intended for adults only (no kids under 16)
      - facility_wellness - object has a wellness area
      - facility_gay_friendly - object is friendly for LGBT+ people
      - facility_barbecue - visitors have the possibility to use the barbecue for themselves
      - facility_home_appliances - room/apartment is equipped with household appliances
      - facility_fireplace - room/apartment has fireplace
      - facility_parking - object has his own or nearby public parking (free of charge or extra paid)
      - facility_for_families_with_childrens - object is suitable for families with children
      - facility_club_hotel - chosen club hotels
      - facility_fitness_or_gym - object has a place for fitness or/and gym
      - facility_outdoor_pool - object has a minimum of one outdoor pool
      - facility_indoor_pool - object has a minimum of one indoor pool
      - facility_kindergarten - object has his own kindergarten
      - facility_water_slides - object has at least one big water slide
      - facility_facilities_for_disabled - in object or/and room are present facilities for disabled
      - facility_pets - guests can take pets with them (free of charge or extra payed)
      - facility_internet_access - internet access is possible in object or/and room (free of charge or extra payed)
      - facility_air_conditioning - all or part of the rooms in object have air condition (free of charge or extra payed)
      - facility_night_life - object have a night club
      - facility_winter_equipment_rental - object organize winter equipment rental

      ### object activities
      - activity_bicycles - object has his own or near bike rental and is located near bicycle routes
      - activity_animation_for_adults - hotel organizes animation for adults
      - activity_sport - object enables some sport activities (f.e. soccer, volleuball, table tennis)
      - activity_tennis - object has his own or nearby tennis court
      - activity_golf - object has his own or nearby golf course
      - activity_minigolf - object has his own minigolf course
      - activity_water_sports - object enables some water sport activites such canoeing or swimming on a boat
      - activity_diving - object or his partner organize diving
      - activity_riding - object or his partner organize riding
      - activity_nordic_walking - object is situated in area good for nordic walking
      - activity_windsurfing - object or his partner organize windsurfing
      - activity_sailing - object or his partner organize sailing
      - activity_winter_sports - object is located in area suitable for winter sport activities





x-tagGroups:
  - name: Authentication
    tags:
      - Tokens
  - name: Search
    tags:
      - Trips
      - Insurances
      - Parkings
      - Cars/Transfers
  - name: Booking
    tags:
      - Booking
  - name: Booking Management System
    tags:
      - bookv4.1
      - bookv5
  - name: Models
    tags:
      - searchfields
      - offer

#  - name: Models
#    tags:
#      - pet_model
#      - store_model

paths:
  /v5/token/new:
    post:
      tags:
        - Tokens
      summary: Acquire new token
      operationId: getNewToken
      description: |
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/auth"

      responses:
        '200':
          $ref: "#/components/responses/authresponse"
        '401':
          description: Unauthorized

  /v5/data/travel/searchbase:
    post:
      tags:
        - Trips
      summary: 'Searchbase'
      operationId: travelSearchbase
      security:
        - TokenAuth: [ ]
      description: |
        Gives you all known possible values for each search field. You can choose to groups fields for each supplier/subset,

      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [ Language, SearchBase ]
              properties:
                Language:
                  type: string
                  description: Language code
                  default: "PL"
                SearchBase:
                  type: object
                  required: [ Type, Operator, Transport, Accommodation ]
                  properties:
                    Type:
                      type: string
                      default: "trip"
                      description: "Type of requested searchbase only 'trip' avaialbe"
                    Operator:
                      schema: array
                      description: Touroperator code list
                      default: "[]"
                      items:
                        type: string
                    Transport:
                      schema: array
                      description: Transport type combination. See Models -> Search Fields -> ComponentCombinations
                      default: "[]"
                      items:
                        type: string
                        enum: [ "transport.flight,accommodation.*","transport.bus,accommodation.*","transport.train,accommodation.*","accommodation.*","transport.flight","transport.bus" ]
                    Accommodation:
                      schema: array
                      description: "Accommodation: See Models -> Search Fields -> ComponentCombinations"
                      default: "[]"
                      items:
                        type: string
                        enum: [ "accommodation.hotel", "accommodation.apartament", "accommodation.trip", "accommodation.holidayhome", "accommodation.cruise", "accommodation.citybreak", "accommodation.childcamp", "accommodation.cruisePL", "accommodation.pilgrimage", "accommodation.activetravel", "accommodation.sanatorium", "accommodation.camp" ]

      responses:
        '200':
          $ref: "#/components/responses/searchbaseresp"
        '401':
          $ref: "#/components/responses/response_401"

  /v5/data/insurance/searchbase:
    get:
      tags:
        - Insurances
      summary: 'Searchbase'
      operationId: insuranceSearchbase
      security:
        - TokenAuth: [ ]
      description: |
        Gives you all known possible values for each search field. You can choose to groups fields for each supplier.

      parameters:
        - $ref: "externalservicesv1.yaml#/components/parameters/fields.insurance"
        - $ref: "externalservicesv1.yaml#/components/parameters/baseOperator"
      responses:
        '200':
          $ref: "externalservicesv1.yaml#/components/responses/searchbaseresp.insurance"
        '401':
          $ref: "#/components/responses/response_401"

  /v5/data/parking/searchbase:
    get:
      tags:
        - Parkings
      summary: 'Searchbase'
      operationId: parkingSearchbase
      security:
        - TokenAuth: [ ]
      description: |
        Gives you all known possible values for each search field. You can choose to groups fields for each supplier.

      parameters:
        - $ref: "externalservicesv1.yaml#/components/parameters/fields.parking"
        - $ref: "externalservicesv1.yaml#/components/parameters/baseOperator"
      responses:
        '200':
          $ref: "externalservicesv1.yaml#/components/responses/searchbaseresp.parking"
        '401':
          $ref: "#/components/responses/response_401"

  /v5/data/travel/autocomplete/Accommodation.Name:
    get:
      tags:
        - Trips
      summary: "AccommodationName autocomplete"
      operationId: AccommodationAutocomplete
      parameters:
        - in: query
          explode: false
          style: form
          required: true
          name: 'Base.Operator'
          schema:
            type: array
            items:
              type: string
            minItems: 1
        - in: query
          explode: false
          style: form
          name: 'Base.ComponentsCombinations.Transport'
          schema:
            type: array
            items:
              type: string
        - in: query
          explode: false
          style: form
          name: 'Base.ComponentsCombinations.Accommodation'
          schema:
            type: array
            items:
              type: string
        - in: query
          explode: false
          style: form
          name: 'Base.DestinationLocation.Id'
          schema:
            type: array
            items:
              type: string
        - in: query
          explode: true
          style: form
          required: true
          name: 'query'
          schema:
            type: string
            minLength: 3

      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        Base:
                          type: object
                          properties:
                            ObjectId:
                              type: string
                              description: ObjectId
                        Accommodation:
                          type: object
                          properties:
                            Name:
                              type: string
                              description: AccommodationName

  /v5/data/travel/search:
    post:
      tags:
        - Trips
      summary: Search
      operationId: travelSearch
      description: |
        Search request can return up to 4 sets of data: filters, reduced filters , grouped offers , and offers

        - Filters:
        List of possible values for search fields. They use base conditions.
        - Reduced filters:
        List of possible values for search fields. They use filter conditions on top of base conditions.
        - Grouped offers
        List of grouped offers. They use filter conditions on top of base conditions, grouped by group field.
        - Offers
        List of offers . They use filter conditions on top of base conditions + value of group field. 


      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [ conditions, results ]
              properties:
                conditions:
                  type: object
                  required: [ search, filter ]
                  properties:
                    search:
                      allOf:
                        - $ref: "#/components/schemas/baseconditions"
                        - $ref: "#/components/schemas/field_searchid"
                    filter:
                      allOf:
                        - $ref: "#/components/schemas/baseconditions"
                results:
                  type: object
                  properties:
                    groupBy:
                      properties:
                        key:
                          type: string
                          enum: [ "Base.Operator", "Base.StartDate", "Base.NightsBeforeReturn", "Base.DepartureLocation", "Base.DestinationLocation", "Accommodation.Type", "Accommodation.XCode", "Accommodation.Category", "Accommodation.Room", "Accommodation.Service" ]
                        value:
                          type: string
                          description: Offerlist will return elements only for selected value
                views:
                  $ref: "#/components/schemas/views"

      responses:
        '200':
          $ref: "#/components/responses/travelsearchresponse"
        '401':
          $ref: "#/components/responses/response_401"
        '500':
          $ref: "#/components/responses/response_500"

  /v5/data/insurance/search:
    post:
      tags:
        - Insurances
      summary: Search
      operationId: insuranceSearch
      description: |
        Search request returns list of offers.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [ conditions ]
              properties:
                conditions:
                  type: object
                  required: [ search ]
                  properties:
                    search:
                      allOf:
                        - $ref: "externalservicesv1.yaml#/components/schemas/baseconditions.insurance"
                        - $ref: "externalservicesv1.yaml#/components/schemas/field_searchid"
                views:
                  type: object
                  properties:
                    offerList:
                      type: object
                      properties:
                        limit:
                          type: integer
                          description: 'max returned results'
                        orderBy:
                          $ref: "externalservicesv1.yaml#/components/schemas/orderBy.insurances"
                        previousPageBookmark:
                          type: string
                          description: 'page bookmark from last offerList result'
                        fieldList:
                          type: array
                          items:
                            type: string
                            enum: [ "Base.Price","Base.OfferId","Base.Operator","Base.OperatorDesc","Base.DestinationLocation","Base.StartDate","Base.ReturnDate","Base.Duration","Base.NightsBeforeReturn","Base.ComponentsCombinations","Insurance.Code","Insurance.Name","Insurance.DestinationLocation","Insurance.PersonsCount","Insurance.StartDate","Insurance.EndDate","Insurance.Description" ]

      responses:
        '200':
          $ref: "externalservicesv1.yaml#/components/responses/insurancesearchresponse"
        '401':
          $ref: "#/components/responses/response_401"
        '500':
          $ref: "#/components/responses/response_500"

  /v5/data/parking/search:
    post:
      tags:
        - Parkings
      summary: Search
      operationId: parkingSearch
      description: |
        Search request returns list of offers.

      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [ conditions ]
              properties:
                conditions:
                  type: object
                  required: [ search ]
                  properties:
                    search:
                      allOf:
                        - $ref: "externalservicesv1.yaml#/components/schemas/baseconditions.parking"
                        - $ref: "externalservicesv1.yaml#/components/schemas/field_searchid"
                views:
                  type: object
                  properties:
                    offerList:
                      type: object
                      properties:
                        limit:
                          type: integer
                          description: 'max returned results'
                        orderBy:
                          $ref: "externalservicesv1.yaml#/components/schemas/orderBy.parkings"
                        previousPageBookmark:
                          type: string
                          description: 'page bookmark from last offerList result'
                        fieldList:
                          type: array
                          items:
                            type: string
                            enum: [ "Base.Price","Base.OfferId","Base.Operator","Base.OperatorDesc","Base.DepartureLocation","Base.StartDate","Base.ReturnDate","Base.Duration","Base.NightsBeforeReturn","Base.ComponentsCombinations","Base.Transfer","Parking.Code","Parking.Name","Parking.DepartureLocation","Parking.Location","Parking.CarsCount","Parking.PersonsCount","Parking.StartDateTime","Parking.EndDateTime","Parking.Description" ]

      responses:
        '200':
          $ref: "externalservicesv1.yaml#/components/responses/parkingsearchresponse"
        '401':
          $ref: "#/components/responses/response_401"
        '500':
          $ref: "#/components/responses/response_500"

  /v5/data/travel/details:
    get:
      tags:
        - Trips
      summary: 'Details'
      description: Details request is used, when the client chooses one specific offer from the list or when we would like to show a specific offer.
      operationId: travelDetails
      parameters:
        - in: query
          explode: false
          style: form
          required: true
          name: 'Base.OfferId'
          schema:
            type: string

      responses:
        '200':
          $ref: "#/components/responses/traveldetailsresponse"
        '401':
          $ref: "#/components/responses/response_401"

  /v5/data/insurance/details:
    get:
      tags:
        - Insurances
      summary: 'Details'
      description: Details request is used, when the client chooses one specific offer from the list or when we would like to show a specific offer.
      operationId: insuranceDetails
      parameters:
        - $ref: "externalservicesv1.yaml#/components/parameters/baseOfferId"

      responses:
        '200':
          $ref: "externalservicesv1.yaml#/components/responses/insurancedetailsresponse"
        '401':
          $ref: "#/components/responses/response_401"

  /v5/data/parking/details:
    get:
      tags:
        - Parkings
      summary: 'Details'
      description: Details request is used, when the client chooses one specific offer from the list or when we would like to show a specific offer.
      operationId: parkingDetails
      parameters:
        - $ref: "externalservicesv1.yaml#/components/parameters/baseOfferId"

      responses:
        '200':
          $ref: "externalservicesv1.yaml#/components/responses/parkingdetailsresponse"
        '401':
          $ref: "#/components/responses/response_401"

  /v5/data/travel/checkonline:
    post:
      tags:
        - Trips
      summary: Checkonline
      operationId: travelCheckOnline
      description: Check Online
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [ actions,offerIds ]
              properties:
                actions:
                  type: array
                  minItems: 1
                  maxItems: 1
                  description: Action to be performed (from offers.online.*.action),
                    currently limited to one action at a time.
                  items:
                    type: string
                offerIds:
                  type: array
                  minItems: 1
                  maxItems: 1
                  description: List of OfferId's to perform actions
                    currently limited to one offer at a time.
                  items:
                    type: string
                bookingId:
                  type: string
                  description: Booking number (booking swap action only)
                includeTFG:
                  type: boolean
                  description: Request operator to return prices with TFG (Tourist Guarantee Fund-special support for tour operators) included
                  default: false
      responses:
        '200':
          $ref: "#/components/responses/travelcheckonlineresponse"
        '401':
          $ref: "#/components/responses/response_401"

  /v5/data/travel/checkdetailsonline:
    post:
      tags:
        - Trips
      summary: Checkonline details
      operationId: travelCheckDetailsOnline
      description: |
        Allow to check online status and prices changes of selected offer with chosen services.
        
        Return online checked offer with updated status and prices.
      parameters:
        - $ref: "#/components/parameters/baseOfferId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/bookingFormRequest"
      responses:
        '200':
          $ref: "#/components/responses/travelcheckdetailsonlineresponse"
        '401':
          $ref: "#/components/responses/response_401"

  /v5/booking/form:
    get:
      tags:
        - Booking
      summary: Form
      operationId: bookForm
      description: |
        Return online checked offer with current status and prices and booking form
      parameters:
        - $ref: "#/components/parameters/baseOfferId"
      responses:
        '200':
          $ref: "#/components/responses/bookingformresponse"
        '401':
          $ref: "#/components/responses/response_401"

  /v5/booking/formcheck:
    post:
      tags:
        - Booking
      summary: Form check
      operationId: bookFormCheck
      description: |
        Allow to check online status and prices changes of selected offer with filled book form.
        
        Return online checked offer with updated status and prices for sent book form.
      parameters:
        - $ref: "#/components/parameters/baseOfferId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [ form ]
              properties:
                form:
                  $ref: "#/components/schemas/bookingFormRequest"
      responses:
        '200':
          $ref: "#/components/responses/bookingformresponse"
        '401':
          $ref: "#/components/responses/response_401"

  /v5/booking/status:
    get:
      tags:
        - Booking
      summary: Status
      operationId: bookStatus
      description: |
        Return online checked booking status witg basic data
      parameters:
        - $ref: "#/components/parameters/bookingId"
        - $ref: "#/components/parameters/bookingOperator"
      responses:
        '200':
          $ref: "#/components/responses/bookingstatusresponse"
        '401':
          $ref: "#/components/responses/response_401"

  /v4.1/booking/status:
    get:
      operationId: V41bookingStatus
      summary: Status
      description: |
        Status is information about the type of reservation.
        
        Status code description:
          - **XX** Canceled booking
          - **RQ** Reservation âon requestâ
          - **OP** Option reservation with date when the reservation expires
          - **OQ** offer to pay, non-blocking seats option
          - **RF** CONFIRMED option reservation
          - **OK** Firm booking
          - **??** Because of technical reasons, booking status could not be determined
      tags:
        - bookv4.1
      parameters:
        - $ref: "#/components/parameters/bookingNr"
        - $ref: "#/components/parameters/operator"
      responses:
        '200':
          description: OK
          content:
            application/xml:
              schema:
                $ref: "bookv41.yaml#/components/schemas/bookresponse"
            application/json:
              schema:
                $ref: "bookv41.yaml#/components/schemas/bookresponse"

  /v4.1/booking/vouchers:
    get:
      operationId: V41bookingVouchers
      summary: Vouchers
      description:
        Return list of documents provided by the tour operator, may differ depending on the status of the booking
      tags:
        - bookv4.1
      parameters:
        - $ref: "#/components/parameters/bookingNr"
        - $ref: "#/components/parameters/operator"
      responses:
        '200':
          description: Return list of documents
          content:
            application/xml:
              example: |
                <?xml version="1.0" encoding="UTF-8" standalone="no"?>
                <response>
                  <status>OK</status>
                  <vouchers>
                    <voucher>
                      <id>0</id>
                      <name>documents for the agent</name>
                      <link>https://example.com/1.pdf</link>
                    </voucher>
                    <voucher>
                      <id>1</id>
                      <name>1,000 pages that no one reads</name>
                      <link>https://example.com/2.pdf</link>
                    </voucher>
                    <voucher>
                      <id>2</id>
                      <name>kidney donor contract</name>
                      <link>https://example.com/blabla.pdf</link>
                    </voucher>                                
                  </vouchers>
                </response>

              schema:
                $ref: "bookv41.yaml#/components/schemas/vouchersresponse"
            application/json:
              schema:
                $ref: "bookv41.yaml#/components/schemas/vouchersresponse"


  /v4.1/booking/display:
    get:
      operationId: V41bookingDisplay
      tags:
        - bookv4.1
      summary: Display
      description: |
        All booking details with information about travel dates, accomodation dates, status or payment terms.
        
        Status is information about the type of reservation. We distinguish the following codes: 
          - **XX** Canceled booking
          - **RQ** Reservation âon requestâ
          - **OP** Option reservation with date when the reservation expires
          - **OQ** offer to pay, non-blocking seats option
          - **RF** CONFIRMED option reservation
          - **OK** Firm booking
          - **??** Because of technical reasons, booking status could not be determined
      parameters:
        - $ref: "#/components/parameters/bookingNr"
        - $ref: "#/components/parameters/operator"
      responses:
        '200':
          description: OK
          content:
            application/xml:
              schema:
                $ref: "bookv41.yaml#/components/schemas/bookresponse"
            application/json:
              schema:
                $ref: "bookv41.yaml#/components/schemas/bookresponse"



