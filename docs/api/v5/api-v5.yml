components:
  parameters:
    operator:
      in: query
      name: 'Operator'
      required: true
      schema:
        type: string
    bookingNr:
      in: query
      name: 'BookingNumber'
      required: true
      schema:
        type: string
    offerId:
      in: query
      name: 'OfferId'
      required: true
      schema:
        type: string
    baseOfferId:
      in: query
      name: 'Base.OfferId'
      required: true
      schema:
        type: string
    bookingOperator:
      in: query
      name: 'Booking.Operator'
      required: true
      schema:
        type: string
    bookingId:
      in: query
      name: 'Booking.Id'
      required: true
      schema:
        type: string
  schemas:
    auth:
      type: object
      required: [ login, domain, source, type ]
      properties:
        login:
          type: string
        expedient:
          type: string
          description: Expedient/consultant individual code generated by support
        password:
          type: string
        subsystem:
          description: It is a good practice to have information about origin of request.
            It will be used for troubleshoting and service usage hints.
            You can put there information about envinroment or Id of 3rd party developer which received token.
            This information will be passed to external content provider if supported by supplier.
          type: string
          pattern: '[0-9a-zA-Z]{0,32}'
        domain:
          type: string
          description: For services using direct requests from page, limiting crossite request to specific domain
        source:
          enum: [ 'B2B', 'B2C' ]
          description: Source origin, if request came from B2B or B2C portal
          type: string
        type:
          enum: [ 'web' ]
          default: 'web'
          description: |
            type of token to create:
            web - for frontend applicaitons, will autoexpire, can't be invalidated
                  in case of 412 response from search page should generate new token thru backend script.
                  Minimum lifetime is not guaranted, max is 20min.
          type: string
        language:
          type: string
          default: 'pl'
          description: Expected language of content in response
    orderBy:
      type: array
      items:
        type: string
        enum: [ "Base.Price.Total","Base.Price.FirstPerson","Accommodation.Name","Base.Operator","Accommodation.XService","Accommodation.Rating","Base.StartDate","Base.DepartureLocation","Base.NightsBeforeReturn","Base.XCode","Accommodation.Category","Base.XRegion","Base.XCountry","Accommodation.DistanceToSlope" ]
    views:
      type: object
      properties:
        unfilteredFieldValues:
          description: "list of possible field excluding filter conditions (using search conditions)"
          type: object
          required: [ fieldList ]
          properties:
            fieldList:
              type: array
              items:
                type: string
                enum: [ "Base.Catalog", "Base.StartDate","Base.NightsBeforeReturn","Base.DepartureLocation","Accommodation.Name","Accommodation.Room","Accommodation.Board" ]
        fieldValues:
          description: "list of possible field values (using search and filter conditions)"
          type: object
          required: [ fieldList ]
          properties:
            fieldList:
              type: array
              items:
                type: string
                enum: [ "Base.Catalog", "Base.StartDate","Base.NightsBeforeReturn","Base.DepartureLocation","Accommodation.Name","Accommodation.Room","Accommodation.Board" ]
        groupedList:
          description: "require group key to be set"
          type: object
          properties:
            orderBy:
              $ref: "#/components/schemas/orderBy"
            previousPageBookmark:
              type: string
              description: 'page bookmark from last groupedList result'
            excludeGroupValues:
              type: array
              items:
                type: string
              description: 'exclude results with specified group keys from answer, supported only for groupBy: [Accommodation.XCode]'
              deprecated: true
            prioritizeGroupValues:
              type: array
              items:
                type: string
              description: 'prioritize results with specified group keys from answer, supported only for groupBy: [Accommodation.XCode]'
            limit:
              type: integer
              description: 'max returned results'
            fieldList:
              type: array
              items:
                type: string
                enum: [ "Base.StartDate","Base.NightsBeforeReturn","Base.DepartureLocation","Accommodation.Name","Accommodation.Room","Accommodation.Board" ]
        regionList:
          description: ""
          type: object
          properties:
            fieldList:
              type: array
              items:
                type: string
                enum: [ "Base.StartDate","Base.NightsBeforeReturn","Base.DepartureLocation","Accommodation.Name","Accommodation.Room","Accommodation.Board" ]
        skiRegionList:
          description: ""
          type: object
          properties:
            fieldList:
              type: array
              items:
                type: string
                enum: [ "Base.StartDate","Base.NightsBeforeReturn","Base.DepartureLocation","Accommodation.Name","Accommodation.Room","Accommodation.Board" ]
        offerList:
          type: object
          description: "If conditions.results.group.valuekey is selected, it will return only offers for selected key"
          properties:
            limit:
              type: integer
              description: 'max returned results'
            limitFrom:
              type: integer
              deprecated: true
            orderBy:
              $ref: "#/components/schemas/orderBy"
            orderByPriority:
              $ref: "#/components/schemas/orderPrio"
            previousPageBookmark:
              type: string
              description: 'page bookmark from last offerList result'
            multiroom:
              type: boolean
              description: 'Enables multiroom response: each offer term will be returned only once for each board type'
            fieldList:
              type: array
              items:
                type: string
                enum: [ "Base.StartDate","Base.NightsBeforeReturn","Base.DepartureLocation","Accommodation.Name","Accommodation.Room","Accommodation.Board" ]
        groupedListSelectedOfferListPriceMatrix:
          description: "price for field values using all conditions including group key, available only if grouping is enabled "
          type: object
          properties:
            fieldList:
              type: array
              items:
                type: string
                enum: [ "Base.Operator" ]

    orderPrio:
      required: [ items ]
      description: |
        Sort offers by priority (used before the regular 'orderBy' field):
        - not guaranteed
        - currently limited to single field
        - empty array '[]' signalize where to put offers without priority set
        - for e.g. to prioritize 7 and 14 durations in the first place, then 8,9,13,15 in the second; use:      
        field:"Base.NightsBeforeReturn",prio:[["7","14"],["6","8","13","15"]]        
        - to show the offers of Operator "OP1" at the beginning and "OP2" at the very end use:        
        field:"Base.Operator",prio:[["OP1"],[],["OP2"]]
      type: array
      maxItems: 1
      minItems: 1
      items:
        $ref: "#/components/schemas/orderByPrioField"

    bookconfirm:
      type: object
      required: [ confirmBook ]
      properties:
        confirmBook:
          type: boolean

    bookcancel:
      type: object
      required: [ bookcancel ]
      properties:
        confirmCancel:
          type: boolean

    orderByPrioField:
      type: object
      required: [ field, mapping ]
      properties:
        field:
          type: string
          description: "order field used for priority"
          example: "Base.NightsBeforeReturn"
        mapping:
          description: specify values in groups in order of priority (from highest to lowest)
          example: [ [ "7","14" ],[ "6","8","13","15" ],[ ],[ "1","2","3" ] ]
          type: array
          minItems: 1
          maxItems: 255
          items:
            description: the order of the values in one priority does not matter
            type: array
            minItems: 1
            items:
              type: string

    fieldValuesResponseDate:
      type: array
      items:
        type: string
        format: date

    fieldValuesResponseInt:
      type: array
      items:
        type: integer
    fieldValuesResponseString:
      type: array
      items:
        type: string

    fieldValuesResponseDesc:
      type: object
      additionalProperties:
        type: string

    fieldValuesResponse:
      type: object
      properties:
        Base.StartDate:
          $ref: "#/components/schemas/fieldValuesResponseDate"
        Base.NightsBeforeReturn:
          $ref: "#/components/schemas/fieldValuesResponseInt"
        Base.DepartureLocation:
          $ref: "#/components/schemas/fieldValuesResponseDesc"
        Accommodation.BuildRenovationYear:
          $ref: "#/components/schemas/fieldValuesResponseInt"
          example: [ 2021, 2022 ]
        Accommodation.Name:
          $ref: "#/components/schemas/fieldValuesResponseDesc"
        Accommodation.Room:
          $ref: "#/components/schemas/fieldValuesResponseDesc"
        Accommodation.Board:
          $ref: "#/components/schemas/fieldValuesResponseDesc"
        Base.Operator:
          description: Operator list, usually a 3 or 4 character operator code
          $ref: "#/components/schemas/fieldValuesResponseDesc"
        Base.XCity:
          $ref: "#/components/schemas/fieldValuesResponseDesc"
        Base.Catalog:
          $ref: "#/components/schemas/fieldValuesResponseString"
        Accommodation.XCity:
          $ref: "#/components/schemas/fieldValuesResponseDesc"
        Accommodation.XService:
          $ref: "#/components/schemas/fieldValuesResponseDesc"
        Accommodation.XCode:
          description: standardized object id, assigned to the hotel by MerlinX, unified hotel code which was matched
          $ref: "#/components/schemas/fieldValuesResponseDesc"
        Accommodation.Category:
          $ref: "#/components/schemas/fieldValuesResponseString"
        Accommodation.Attributes:
          $ref: "#/components/schemas/fieldValuesResponseString"
        Accommodation.Camp.Theme:
          $ref: "#/components/schemas/fieldValuesResponseInt"
        Accommodation.Type:
          $ref: "#/components/schemas/fieldValuesResponseDesc"
        Transport.Type:
          $ref: "#/components/schemas/fieldValuesResponseDesc"

    notapplicable:
      type: boolean
      default: false

    searchbase:
      properties:
        Base.Operator:
          $ref: '#/components/schemas/searchbase.Base.Operator'
        Base.Catalog:
          type: object
          properties:
            notApplicable:
              $ref: '#/components/schemas/notapplicable'
            list:
              $ref: '#/components/schemas/searchbasefield.list'
            text:
              $ref: '#/components/schemas/searchbasefield.text'
          description:
            Price catalog, allows to narrow to a selected offer or catalog of a operator
        Base.DestinationLocation:
          $ref: '#/components/schemas/searchbase.Base.DestinationLocation'
        Base.DepartureLocation:
          $ref: '#/components/schemas/searchbase.Base.DepartureLocation'
        Base.ComponentsCombinations:
          allOf:
            - $ref: '#/components/schemas/searchbasefield.components_combinations'
            - description:
                Combination of components
        Base.StartDateAfter:
          allOf:
            - $ref: '#/components/schemas/searchbasefield.datefield'
            - description:
                Minimum trip start date (including selected)
              deprecated: true
        Base.StartDateBefore:
          allOf:
            - $ref: '#/components/schemas/searchbasefield.datefield'
            - description:
                Maximum trip start date (including selected)
              deprecated: true
        Base.StartDateMin:
          allOf:
            - $ref: '#/components/schemas/searchbasefield.datefield'
            - description:
                Minimum trip start date (including selected)
        Base.StartDateMax:
          allOf:
            - $ref: '#/components/schemas/searchbasefield.datefield'
            - description:
                Maximum trip start date (including selected)
        Base.StartDateDayOfWeek:
          type: object
          properties:
            list:
              $ref: '#/components/schemas/searchbasefield.list'
          description:
            Maximum trip start date (including selected)
        Base.ReturnDateBefore:
          allOf:
            - $ref: '#/components/schemas/searchbasefield.datefield'
            - description:
                Maximum trip return date (for offers with transport it will be return departure date)
              deprecated: true
        Base.ReturnDateMax:
          allOf:
            - $ref: '#/components/schemas/searchbasefield.datefield'
            - description:
                Maximum trip return date (for offers with transport it will be return departure date)

        Base.NightsBeforeReturn:
          allOf:
            - type: object
              properties:
                notApplicable:
                  $ref: '#/components/schemas/notapplicable'
            - $ref: '#/components/schemas/searchbasefield.range'
            - description:
                Nights between start and return (for offers with transport it will be nights till return departure date)
        Base.Promotion:
          type: object
          properties:
            notApplicable:
              $ref: '#/components/schemas/notapplicable'
            list:
              $ref: '#/components/schemas/searchbasefield.list'
          description:
            promotion type, allows to select hits of the week, last and first minutes offers
          deprecated: true
        Base.Candy:
          type: object
          properties:
            notApplicable:
              $ref: '#/components/schemas/notapplicable'
            list:
              $ref: '#/components/schemas/searchbasefield.list'
          description:
            Candy - promoted flag ads, e.g. Free Skipass or internet for the free,  bonus provided by the operator
        Base.Transfer:
          allOf:
            - type: object
              properties:
                notApplicable:
                  $ref: '#/components/schemas/notapplicable'
            - $ref: '#/components/schemas/searchbasefield.attribute'
            - description: 'offers with transfer'

        Base.Availability:
          type: object
          properties:
            availability:
              $ref: '#/components/schemas/searchbasefield.availability'
          description: 'offer availability'

        Accommodation.Category:
          allOf:
            - $ref: '#/components/schemas/searchbasefield.range'
            - type: object
              properties:
                notApplicable:
                  $ref: '#/components/schemas/notapplicable'
            - description:
                Object category, range from 1 to 6, some objects may be without any categories such as apartments or guesthouses
        Accommodation.Rating:
          allOf:
            - $ref: '#/components/schemas/searchbasefield.range'
            - type: object
              properties:
                notApplicable:
                  $ref: '#/components/schemas/notapplicable'
            - description:
                Rating of offers
        Accommodation.XService:
          type: object
          properties:
            notApplicable:
              $ref: '#/components/schemas/notapplicable'
            list:
              $ref: '#/components/schemas/searchbasefield.list'
          description:
            Service/Meal type, list IDs are preserved and will not change meaning

        Accommodation.Camp.Theme:
          allOf:
            - $ref: '#/components/schemas/searchbasefield.grouped_list'
            - type: object
              properties:
                notApplicable:
                  $ref: '#/components/schemas/notapplicable'
            - description:
                Main child camp theme, offers dedicated only for children
        Accommodation.ExtAgentAttributes:
          $ref: '#/components/schemas/searchbase.Accommodation.ExtAgentAttributes'
        Accommodation.Rooms:
          description:
            Board type, list IDs are preserved and will not change meaning
          type: object
          required: [ rooms ]
          properties:
            notApplicable:
              $ref: '#/components/schemas/notapplicable'
            rooms:
              type: object
              required: [ maxCount, type, feature ]
              properties:
                maxCount:
                  type: integer
                  default: 1
                type:
                  required: [ list ]
                  type: object
                  properties:
                    list:
                      $ref: '#/components/schemas/searchbasefield.list'
                  description:
                    room type like Apartament / studio, or simple 2 person room
                feature:
                  required: [ list ]
                  type: object
                  properties:
                    list:
                      $ref: '#/components/schemas/searchbasefield.list'
                  description:
                    features like View type (sea,garden,...),  double bed

        Transport.Flight.AirlineType:
          type: object
          properties:
            notApplicable:
              $ref: '#/components/schemas/notapplicable'
            list:
              $ref: '#/components/schemas/searchbasefield.list'
          description:
            type of airline selection usually gds/lowcost

        Base.ParticipantsList:
          description:
            List of participants, can be Type, Age or BirhDate (for unsupported sources birth date will be calculated
            to age on StartDateAfter)
          type: object
          required: [ participantsList ]
          properties:
            participantsList:
              type: object
              required: [ allowedCodes ]
              properties:
                allowedBirthdate:
                  type: boolean
                  default: false
                allowedAge:
                  type: boolean
                  default: false
                allowedCodes:
                  type: array
                  items:
