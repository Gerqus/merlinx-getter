            schema:
              $ref: "#/components/schemas/bookcancel"
      responses:
        '200':
          description: OK
          content:
            application/xml:
              schema:
                $ref: "bookv41.yaml#/components/schemas/bookresponse"
            application/json:
              schema:
                $ref: "bookv41.yaml#/components/schemas/bookresponse"


  /v4.1/booking/optionChange:
    post:
      operationId: V41bookingChange
      parameters:
        - $ref: "#/components/parameters/bookingNr"
        - $ref: "#/components/parameters/operator"
      summary: Option change
      description: The ability to edit the reservation.  Depending on the tour operator, change the contact details or select other services. In case of change additional services, usually involves an increase the price of the reservation.
      tags:
        - bookv4.1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "bookv41.yaml#/components/schemas/bookrequest"
          application/xml:
            schema:
              $ref: "bookv41.yaml#/components/schemas/bookrequest"
      responses:
        '200':
          description: OK
          content:
            application/xml:
              schema:
                $ref: "bookv41.yaml#/components/schemas/bookresponse"
            application/json:
              schema:
                $ref: "bookv41.yaml#/components/schemas/bookresponse"


  /v4.1/booking/confirm:
    post:
      operationId: V41bookingConfirm
      parameters:
        - $ref: "#/components/parameters/bookingNr"
        - $ref: "#/components/parameters/operator"
      summary: Confirms the reservation
      description: To confirm a reservation which is optional at first should be status checked and option date.
      tags:
        - bookv4.1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "bookv41.yaml#/components/schemas/bookrequest"
          application/xml:
            schema:
              $ref: "bookv41.yaml#/components/schemas/bookrequest"
      responses:
        '200':
          description: OK
          content:
            application/xml:
              schema:
                $ref: "bookv41.yaml#/components/schemas/bookresponse"
            application/json:
              schema:
                $ref: "bookv41.yaml#/components/schemas/bookresponse"

